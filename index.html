<!DOCTYPE html>
<html>
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div class="box">
                <div class="header">
                    <div class="head-color-box" id="head-color-box"></div>
                    <select name="color" id="select-color">
                        <option value="monochrome">Monochrome</option>
                        <option value="monochrome-light">Monochrome Light</option>
                        <option value="monochrome-dark">Monochrome Dark</option>
                        <option value="analogic">Analogic</option>
                        <option value="complement">Complement</option>
                        <option value="analogic-complement">Analogic Complement</option>
                        <option value="triad">Triad</option>
                    </select>
                    <button id="get-color-scheme">Get Color Scheme</button>
                </div>
                <div class="color-grid-container" id="color-grid-container">
                    <div class="color-item">
                        <div class="color color-col-1"></div>
                        <!-- <input type="text" class="color-hex" name="color-hex" /> -->
                        <div class="text-cont">
                            <p>#F55A5A</p>
                        </div>
                    </div>
                    <div class="color-item">
                        <div class="color color-col-2"></div>
                        <div class="text-cont">
                            <p>#2B283A</p>
                        </div>
                    </div>
                    <div class="color-item">
                        <div class="color color-col-3"></div>
                        <div class="text-cont">
                            <p>#FBF3AB</p>
                        </div>
                    </div>
                    <div class="color-item">
                        <div class="color color-col-4"></div>
                        <div class="text-cont">
                            <p>#AAD1B6</p>
                        </div>
                    </div>
                    <div class="color-item">
                        <div class="color color-col-5"></div>
                        <div class="text-cont">
                            <p>#A626D3</p>
                        </div>
                        
                    </div>
                </div> 
            </div> 
        </div>
          
        <script src="index.js"></script>
    </body>
</html>
